<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ideas Estudio</title>
  <meta name="description" content="Ideas Estudio - Web pública" />
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#fffdf7;
      color:#111;
      display:flex;
      min-height:100vh;
      align-items:center;
      justify-content:center;
      padding:40px;
    }
    .card{
      max-width:760px;
      background:white;
      border:1px solid #eee7cc;
      border-radius:24px;
      padding:40px;
      box-shadow:0 10px 30px rgba(0,0,0,.06);
    }
    h1{margin:0 0 12px;font-size:40px;}
    p{font-size:18px;line-height:1.6;margin:0 0 12px;}
    .badge{
      display:inline-block;
      background:#f1d146;
      color:#111;
      padding:8px 14px;
      border-radius:999px;
      font-weight:700;
      margin-bottom:18px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Ideas Estudio</div>
    <h1>Web pública en preparación</h1>
    <p>Este repositorio servirá la página principal de Ideas Estudio.</p>
    <p>La app y la API se desplegarán por separado para mantener una arquitectura limpia y escalable.</p>
  </main>
</body>
</html>
